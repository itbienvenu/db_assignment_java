<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Securities Exchange Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 0; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="hero text-center">
    <h1>Securities Exchange System</h1>
    <p>Manage Exchanges, Securities, and Participants with ease.</p>
</div>

<div class="container">
    <div class="row">
        <!-- Participants Section -->
        <div class="col-md-8 mx-auto">
            <div class="card mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Participants Management</h5>
                    <button class="btn btn-primary btn-sm" onclick="showAddModal()">Add Participant</button>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Address</th>
                                <th>Contact</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="participantList">
                            <!-- Populated via script -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Participant</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="participantForm">
                    <div class="mb-3"><label>Name</label><input type="text" id="pName" class="form-control" required></div>
                    <div class="mb-3"><label>Address</label><input type="text" id="pAddress" class="form-control"></div>
                    <div class="mb-3"><label>Contact</label><input type="text" id="pContact" class="form-control"></div>
                    <button type="submit" class="btn btn-success w-100">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('addModal'));
    
    async function loadParticipants() {
        const resp = await fetch('/api/participants');
        const data = await resp.json();
        const list = document.getElementById('participantList');
        list.innerHTML = data.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>${p.address}</td>
                <td>${p.contactDetails}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteParticipant(${p.participantId})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('participantForm').onsubmit = async (e) => {
        e.preventDefault();
        const p = {
            name: document.getElementById('pName').value,
            address: document.getElementById('pAddress').value,
            contactDetails: document.getElementById('pContact').value
        };
        await fetch('/api/participants', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(p)
        });
        modal.hide();
        loadParticipants();
        e.target.reset();
    };

    async function deleteParticipant(id) {
        if(confirm('Are you sure?')) {
            await fetch('/api/participants/' + id, {method: 'DELETE'});
            loadParticipants();
        }
    }

    function showAddModal() { modal.show(); }

    loadParticipants();
</script>

</body>
</html>
